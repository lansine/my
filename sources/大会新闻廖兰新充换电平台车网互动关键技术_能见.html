<p>11月20日-22日，2024中国汽车充换电生态大会在山西太原举办。本届大会由国家能源局电力司和中国汽车工业协会指导，中国电动汽车充电基础设施促进联盟、中国汽车工业协会充换电分会主办，以"新格局"为主题。</p>
