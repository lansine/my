<h1>小桔充电与星源博锐成立联合实验室</h1>
<p>电商报 | 2025-09-07 11:00:05</p>
<p>9月7日消息，小桔充电近日携手星源博锐在深圳成立新能源汽车产业充换电网络基础设施"智能运维"联合实验室。通过联合研发，小桔充电将智能运维技术深入到"模块级"，同时将进一步发挥模块侧和平台侧的合力，将技术成果转化成产品价值并传递给客户。</p>
