<h1>小桔充电亮相第14届中国汽车论坛</h1>
<p>电商报 | 2024-07-16 16:08:25</p>
<p>7月16日消息，第14届中国汽车论坛7月11日-13日在上海举行，会议期间，小桔能源CTO廖兰新受邀发表主题演讲《充换电平台电池防护解决方案》，分享小桔充电在充电安全技术方面的积累，以及电池防护科技服务在充换电等多领域的应用实践。</p>
