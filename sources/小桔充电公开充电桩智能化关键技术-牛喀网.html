<h1>小桔充电公开充电桩智能化关键技术</h1>
<p>汽车之家 2023-09-22</p>
<p>据汽车之家报道，小桔充电首次公开的充电桩智能化关键技术，涵盖充电安全、可靠体验、智能运维、电力调度、智能引擎等五大技术领域。小桔充电将充电桩智能化五大关键技术融入到一个技术架构中，称之为充电桩智能操作系统，通过三层架构，建立了多角色、多场景、全协同的智能化生态。</p>
