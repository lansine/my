name: Deploy to Alibaba Cloud OSS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ossutil
        run: |
          curl -o ossutil https://gosspublic.alicdn.com/ossutil/v2/v2.0.3-beta.09171430/linux-amd64/ossutil
          chmod +x ossutil
          sudo mv ossutil /usr/local/bin/

      - name: Upload to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          ossutil cp -r ./ oss://${{ vars.OSS_BUCKET }}/ \
            --endpoint ${{ vars.OSS_ENDPOINT }} \
            --access-key-id "$OSS_ACCESS_KEY_ID" \
            --access-key-secret "$OSS_ACCESS_KEY_SECRET" \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --force
