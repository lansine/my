name: Deploy to Alibaba Cloud OSS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ossutil
        run: |
          curl -fSL -o ossutil64.zip https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil-v1.7.19-linux-amd64.zip
          unzip ossutil64.zip
          chmod +x ossutil-v1.7.19-linux-amd64/ossutil64
          sudo mv ossutil-v1.7.19-linux-amd64/ossutil64 /usr/local/bin/ossutil

      - name: Configure ossutil
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          ossutil config -e ${{ vars.OSS_ENDPOINT }} -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET"

      - name: Upload to OSS
        run: |
          ossutil cp -r ./ oss://${{ vars.OSS_BUCKET }}/ \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --force
